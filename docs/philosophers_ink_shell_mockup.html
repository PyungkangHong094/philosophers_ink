<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>현자의 잉크 — 셸 디자인 목업</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root{
  --black-0:#050505;
  --black-1:#0A0A09;
  --black-2:#131311;
  --black-3:#1D1C19;
  --hairline:#29271F;
  --gold:#C9A227;
  --gold-hi:#E8C95A;
  --gold-deep:#8F7118;
  --parchment:#F2EDDF;
  --text-2:#9C968A;
  --text-3:#5E5A50;
  --ch-nigredo:#1D1418;
  --ch-albedo:#E9E5DB;
  --ch-citrinitas:#D9A62E;
  --ch-rubedo:#8E1F2F;
  --display:'Anton', Impact, 'Arial Black', sans-serif;
  --body:'Noto Sans KR', 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--black-0);
  color:var(--parchment);
  font-family:var(--body);
  font-size:15px;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
}
button{font-family:var(--body);border:none;background:none;color:inherit;cursor:pointer}

/* ---------- 화면 공통 ---------- */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 22px) 20px calc(env(safe-area-inset-bottom) + 22px);
  opacity:0;pointer-events:none;
  transition:opacity 240ms ease;
  z-index:10;
  overflow-y:auto;
}
.screen.active{opacity:1;pointer-events:auto}

.eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.32em;
  color:var(--text-3);text-transform:uppercase;
}
.display{
  font-family:var(--display);
  letter-spacing:.02em;
  color:var(--parchment);
  line-height:.94;
  font-weight:400;
}

/* ---------- 타이틀 ---------- */
#s-title{background:var(--black-0);align-items:center;justify-content:center;text-align:center;cursor:pointer}
.flask-wrap{margin-bottom:34px;animation:breathe 4s ease-in-out infinite}
@keyframes breathe{
  0%,100%{filter:drop-shadow(0 0 10px rgba(201,162,39,.22))}
  50%{filter:drop-shadow(0 0 26px rgba(201,162,39,.55))}
}
.particle{animation:rise 3.2s ease-in infinite;opacity:0}
@keyframes rise{
  0%{transform:translateY(0);opacity:0}
  15%{opacity:.9}
  80%{opacity:.5}
  100%{transform:translateY(-52px);opacity:0}
}
#s-title .eyebrow{margin-bottom:16px}
.logo{font-size:clamp(56px,17vw,92px)}
.logo-ko{
  margin-top:18px;font-size:15px;font-weight:700;color:var(--text-2);
  letter-spacing:.6em;text-indent:.6em;
}
.tap-hint{
  position:absolute;bottom:calc(env(safe-area-inset-bottom) + 42px);left:0;right:0;
  font-size:12px;font-weight:700;letter-spacing:.22em;color:var(--text-3);
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

/* ---------- 챕터 선택 ---------- */
#s-chapters{background:var(--black-1)}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:26px;min-height:24px;
}
.star-total{
  font-size:13px;font-weight:700;color:var(--gold);
  font-variant-numeric:tabular-nums;letter-spacing:.06em;
}
.ch-title{font-size:34px;font-weight:900;letter-spacing:-.02em;margin-bottom:22px}
.chapter-list{display:flex;flex-direction:column;gap:12px}
.chapter-card{
  position:relative;display:block;width:100%;text-align:left;
  background:var(--black-2);
  border:1px solid var(--hairline);
  border-radius:2px;
  padding:20px 18px 20px 22px;
  transition:background 120ms ease;
}
.chapter-card:active{background:var(--black-3)}
.chapter-card .spine{
  position:absolute;left:0;top:0;bottom:0;width:3px;
}
.chapter-card .row{display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.chapter-card .name{font-family:var(--display);font-size:32px;line-height:1;letter-spacing:.03em}
.chapter-card .sub{font-size:12px;color:var(--text-2);margin-top:8px}
.chapter-card .prog{
  text-align:right;font-variant-numeric:tabular-nums;
  font-size:13px;font-weight:700;color:var(--text-2);white-space:nowrap;
}
.chapter-card .prog .stars{color:var(--gold);display:block;margin-top:5px}
.chapter-card.current{border-color:var(--gold)}
.chapter-card.locked .name,.chapter-card.locked .sub,.chapter-card.locked .prog{color:var(--text-3)}
.chapter-card.locked .spine{opacity:.3}
.chapter-card.locked:active{background:var(--black-2);animation:deny 260ms ease}
@keyframes deny{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

/* ---------- 레벨 선택 ---------- */
#s-levels{background:var(--black-1)}
.back{
  font-size:13px;font-weight:700;color:var(--text-2);
  padding:8px 12px;margin-left:-12px;letter-spacing:.06em;
}
.back:active{color:var(--parchment)}
.lv-head{margin:6px 0 26px}
.lv-head .display{font-size:clamp(54px,17vw,72px)}
.lv-head .sub{font-size:13px;color:var(--text-2);margin-top:10px;letter-spacing:.04em}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.cell{
  position:relative;aspect-ratio:1;
  background:var(--black-2);
  border:1px solid var(--hairline);
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:18px;color:var(--parchment);
  transition:background 120ms ease;
}
.cell:active{background:var(--black-3)}
.cell .cell-stars{
  position:absolute;bottom:6px;left:0;right:0;text-align:center;
  font-family:var(--body);font-size:8px;letter-spacing:2px;text-indent:2px;color:var(--gold);
}
.cell.current{
  border-color:var(--gold);color:var(--gold);
  box-shadow:0 0 16px rgba(201,162,39,.32);
}
.cell.locked{color:var(--text-3);background:var(--black-1)}
.cell.locked:active{background:var(--black-1)}
.cell.op{box-shadow:inset 0 0 0 1px var(--gold-deep)}
.cell.op.current{box-shadow:inset 0 0 0 1px var(--gold), 0 0 16px rgba(201,162,39,.32)}

/* ---------- 잉크 플러드 (시그니처 전환) ---------- */
#flood{
  position:fixed;width:10px;height:10px;border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;z-index:50;
}
#flood.expand{
  transform:translate(-50%,-50%) scale(320);
  transition:transform 650ms cubic-bezier(.77,0,.18,1);
}
#flood.fade{opacity:0;transition:opacity 350ms ease}
#flood-label{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:clamp(40px,13vw,60px);color:var(--ch-nigredo);
  opacity:0;pointer-events:none;z-index:51;
  transition:opacity 260ms ease;letter-spacing:.03em;
}
#flood-label.show{opacity:1}

/* ---------- 클리어 ---------- */
#s-clear{background:var(--black-0);align-items:center;justify-content:center;text-align:center;gap:0}
#s-clear .eyebrow{margin-bottom:18px}
.clear-title{font-size:42px;font-weight:900;letter-spacing:-.01em}
.stars-row{display:flex;gap:16px;margin:30px 0 34px}
.stamp{
  font-size:42px;color:var(--gold);
  text-shadow:0 0 18px rgba(201,162,39,.45);
  opacity:0;transform:scale(1.8);
}
.run .stamp{animation:stamp 450ms cubic-bezier(.2,1.4,.4,1) forwards}
.run .stamp:nth-child(2){animation-delay:250ms}
.run .stamp:nth-child(3){animation-delay:500ms}
@keyframes stamp{
  0%{opacity:0;transform:scale(1.8)}
  60%{opacity:1;transform:scale(.92)}
  100%{opacity:1;transform:scale(1)}
}
.gauge{width:230px;margin-bottom:38px}
.gauge .g-row{
  display:flex;justify-content:space-between;
  font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:9px;
}
.gauge .g-row .val{color:var(--gold);font-variant-numeric:tabular-nums}
.gauge .track{height:6px;border:1px solid var(--hairline);border-radius:1px;background:var(--black-2)}
.gauge .fill{height:100%;width:0;background:var(--gold)}
.run .fill{width:62%;transition:width 900ms cubic-bezier(.2,.8,.2,1) 900ms}
.btn-col{display:flex;flex-direction:column;gap:10px;width:230px}
.btn{
  padding:15px 0;border-radius:2px;
  font-size:14px;font-weight:800;letter-spacing:.08em;
  transition:background 120ms ease;
}
.btn-primary{background:var(--gold);color:var(--black-0)}
.btn-primary:active{background:var(--gold-deep)}
.btn-ghost{border:1px solid var(--hairline);color:var(--parchment)}
.btn-ghost:active{background:var(--black-3)}

/* ---------- 데모 배지 ---------- */
.demo-tag{
  position:fixed;top:calc(env(safe-area-inset-top) + 6px);right:8px;z-index:60;
  font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--text-3);
  pointer-events:none;
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<div class="demo-tag">SHELL MOCKUP v0.3</div>

<!-- ========== 타이틀 ========== -->
<section id="s-title" class="screen active">
  <div class="flask-wrap">
    <svg width="128" height="158" viewBox="0 0 120 150" fill="none" aria-label="플라스크">
      <path d="M46 10 H74" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M52 12 V54 C34 64 24 82 24 102 A36 34 0 0 0 96 102 C96 82 86 64 68 54 V12"
            stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M33 98 Q60 89 87 98" stroke="var(--gold-deep)" stroke-width="2" stroke-linecap="round" opacity=".75"/>
      <circle class="particle" cx="52" cy="100" r="2"   fill="var(--gold-hi)" style="animation-delay:0s"/>
      <circle class="particle" cx="63" cy="104" r="1.6" fill="var(--gold-hi)" style="animation-delay:.7s"/>
      <circle class="particle" cx="58" cy="98"  r="2.2" fill="var(--gold-hi)" style="animation-delay:1.3s"/>
      <circle class="particle" cx="68" cy="101" r="1.5" fill="var(--gold-hi)" style="animation-delay:1.9s"/>
      <circle class="particle" cx="47" cy="103" r="1.7" fill="var(--gold-hi)" style="animation-delay:2.5s"/>
    </svg>
  </div>
  <div class="eyebrow">Magnum Opus</div>
  <h1 class="display logo">PHILOSOPHER'S<br>INK</h1>
  <div class="logo-ko">현자의 잉크</div>
  <div class="tap-hint">화면을 터치하여 시작</div>
</section>

<!-- ========== 챕터 선택 ========== -->
<section id="s-chapters" class="screen">
  <div class="topbar">
    <span class="eyebrow">대업 · Magnum Opus</span>
    <span class="star-total" id="total-stars">★ 45</span>
  </div>
  <h2 class="ch-title">챕터</h2>
  <div class="chapter-list">
    <button class="chapter-card" data-go="levels">
      <span class="spine" style="background:var(--ch-nigredo)"></span>
      <span class="row">
        <span>
          <span class="name">NIGREDO</span>
          <span class="sub" style="display:block">흑화 · 레벨 1–11</span>
        </span>
        <span class="prog">11/11<span class="stars">★ 24</span></span>
      </span>
    </button>
    <button class="chapter-card current" data-go="levels">
      <span class="spine" style="background:var(--ch-albedo)"></span>
      <span class="row">
        <span>
          <span class="name">ALBEDO</span>
          <span class="sub" style="display:block">백화 · 레벨 12–33</span>
        </span>
        <span class="prog" id="ch-albedo-prog">11/22<span class="stars">★ 19</span></span>
      </span>
    </button>
    <button class="chapter-card locked">
      <span class="spine" style="background:var(--ch-citrinitas)"></span>
      <span class="row">
        <span>
          <span class="name">CITRINITAS</span>
          <span class="sub" style="display:block">황화 · 알베도 완료 시 해금</span>
        </span>
        <span class="prog">잠김</span>
      </span>
    </button>
    <button class="chapter-card locked">
      <span class="spine" style="background:var(--ch-rubedo)"></span>
      <span class="row">
        <span>
          <span class="name">RUBEDO</span>
          <span class="sub" style="display:block">적화 · 키트리니타스 완료 시 해금</span>
        </span>
        <span class="prog">잠김</span>
      </span>
    </button>
  </div>
</section>

<!-- ========== 레벨 선택 ========== -->
<section id="s-levels" class="screen">
  <div class="topbar">
    <button class="back" data-go="chapters">‹ 챕터</button>
    <span class="star-total">★ 13</span>
  </div>
  <div class="lv-head">
    <div class="display">ALBEDO</div>
    <div class="sub">백화 · 서리 룬</div>
  </div>
  <div class="grid" id="grid"></div>
</section>

<!-- ========== 클리어 ========== -->
<section id="s-clear" class="screen">
  <div class="eyebrow" id="clear-eyebrow">Albedo · Level 23</div>
  <div class="clear-title">정제 완료</div>
  <div class="stars-row">
    <span class="stamp">★</span><span class="stamp">★</span><span class="stamp">★</span>
  </div>
  <div class="gauge">
    <div class="g-row"><span>잉크 잔량</span><span class="val">62%</span></div>
    <div class="track"><div class="fill"></div></div>
  </div>
  <div class="btn-col">
    <button class="btn btn-primary" id="btn-next">다음 레벨</button>
    <button class="btn btn-ghost" id="btn-retry">다시 정제</button>
  </div>
</section>

<!-- 잉크 플러드 -->
<div id="flood"></div>
<div id="flood-label">LEVEL 23</div>

<script>
(function(){
  var ALBEDO = getComputedStyle(document.documentElement).getPropertyValue('--ch-albedo').trim();
  var state = {
    current: 23,
    stars: {12:3, 13:2, 14:2, 15:1, 16:2, 17:2, 18:1, 19:2, 20:1, 21:2, 22:1} // 클리어 레벨의 별 (합 19)
  };

  function show(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById('s-' + id).classList.add('active');
  }

  /* ----- 레벨 그리드 ----- */
  function renderGrid(){
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (var n = 12; n <= 33; n++){
      var cell = document.createElement('button');
      cell.className = 'cell';
      cell.textContent = n;
      if (n % 11 === 0) cell.classList.add('op'); // 작업(OPERATIO) 레벨 골드 링
      if (state.stars[n]){
        var s = document.createElement('span');
        s.className = 'cell-stars';
        s.textContent = '★'.repeat(state.stars[n]);
        cell.appendChild(s);
      } else if (n === state.current){
        cell.classList.add('current');
      } else {
        cell.classList.add('locked');
      }
      if (state.stars[n] || n === state.current){
        cell.dataset.level = n;
        cell.addEventListener('click', onLevelTap);
      }
      grid.appendChild(cell);
    }
    var earned = 0, cleared = 0;
    for (var k in state.stars){ earned += state.stars[k]; cleared++; }
    document.querySelector('#s-levels .star-total').textContent = '★ ' + earned;
    document.getElementById('ch-albedo-prog').innerHTML =
      cleared + '/22<span class="stars">★ ' + earned + '</span>';
    document.getElementById('total-stars').textContent = '★ ' + (24 + earned);
  }

  /* ----- 잉크 플러드: 탭 지점에서 챕터색이 화면을 삼킨다 ----- */
  function onLevelTap(e){
    var n = +e.currentTarget.dataset.level;
    var x = e.clientX || (e.currentTarget.getBoundingClientRect().left + 30);
    var y = e.clientY || (e.currentTarget.getBoundingClientRect().top + 30);
    var flood = document.getElementById('flood');
    var label = document.getElementById('flood-label');
    label.textContent = 'LEVEL ' + n;
    document.getElementById('clear-eyebrow').textContent = 'Albedo · Level ' + n;
    state.playing = n;

    flood.style.background = ALBEDO;
    flood.style.left = x + 'px';
    flood.style.top = y + 'px';
    flood.classList.remove('expand','fade');
    void flood.offsetWidth; // reflow
    flood.classList.add('expand');

    setTimeout(function(){ label.classList.add('show'); }, 480);
    setTimeout(function(){
      // 실제 게임이라면 여기서 인게임 진입. 목업에서는 클리어 화면으로 점프컷.
      label.classList.remove('show');
      showClear();
      flood.classList.add('fade');
      setTimeout(function(){ flood.classList.remove('expand','fade'); }, 400);
    }, 1500);
  }

  /* ----- 클리어 연출 ----- */
  function showClear(){
    var sc = document.getElementById('s-clear');
    sc.classList.remove('run');
    show('clear');
    void sc.offsetWidth;
    sc.classList.add('run');
    if (navigator.vibrate){
      setTimeout(function(){ navigator.vibrate(20); }, 100);
      setTimeout(function(){ navigator.vibrate(20); }, 350);
      setTimeout(function(){ navigator.vibrate(30); }, 600);
    }
  }

  /* ----- 내비게이션 ----- */
  document.getElementById('s-title').addEventListener('click', function(){ show('chapters'); });
  document.querySelectorAll('[data-go]').forEach(function(el){
    el.addEventListener('click', function(){ show(el.dataset.go); });
  });
  document.getElementById('btn-retry').addEventListener('click', function(){
    var sc = document.getElementById('s-clear');
    sc.classList.remove('run');
    void sc.offsetWidth;
    sc.classList.add('run');
  });
  document.getElementById('btn-next').addEventListener('click', function(){
    // 방금 레벨을 3성 클리어 처리하고 다음 레벨을 연다 (상태 데모)
    if (state.playing === state.current){
      state.stars[state.current] = 3;
      state.current = Math.min(state.current + 1, 33);
    }
    renderGrid();
    show('levels');
  });

  renderGrid();
})();
</script>
</body>
</html>
